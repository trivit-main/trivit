<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivit Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="tab-selector"></div>
        <!-- <div class="tab-hover" aria-hidden="true"></div> -->

        <div class="left">
            <div class="logo">
                <img src="Trivit Logo Light V1.png" alt="Trivit Logo">
            </div>
            <nav class="tabs">
                <ul>
                    <li class="tab active" data-tab="home">HOME</li>
                    <li class="tab" data-tab="os">OS</li>
                    <li class="tab" data-tab="browser">BROWSER</li>
                    <li class="tab" data-tab="games">GAMES</li>
                </ul>
            </nav>
        </div>

        <div class="center">
            <div class="search-bar tab">
                <input type="text" placeholder="search">
            </div>
        </div>
        <div class="right">
            <nav class="tabs tabs-right">
                <ul>
                    <li class="tab" data-tab="help">HELP</li>
                    <li class="tab" data-tab="faq">FAQ</li>
                    <li class="tab" data-tab="about">ABOUT US</li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Tab content will go here -->
    </main>

    <script src="script.js"></script>
</body>
</html>
