<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivit</title>
    <link rel="icon" type="image/png" href="Trivit Logo Light V2.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="tab-selector"></div>
        <!-- <div class="tab-hover" aria-hidden="true"></div> -->

        <div class="left">
            <div class="logo">
                <a href="./" aria-label="Go to Trivit home">
                    <img src="Trivit Logo Light V1.png" alt="Trivit Logo">
                </a>
            </div>
            <nav class="tabs">
                <ul>
                    <li class="tab active" data-tab="home"><a class="tab-link" href="./">HOME</a></li>
                    <li class="tab" data-tab="os"><a class="tab-link" href="os/">OS</a></li>
                    <li class="tab" data-tab="browser"><a class="tab-link" href="browser/">BROWSER</a></li>
                    <li class="tab" data-tab="games"><a class="tab-link" href="games/">GAMES</a></li>
                </ul>
            </nav>
        </div>

        <div class="right">
            <div class="search-bar tab">
                <input type="text" placeholder="search">
            </div>
            <button class="auth-trigger tab" type="button" aria-controls="auth-panel" aria-expanded="false" aria-haspopup="dialog">
                LOG IN
            </button>
        </div>
    </header>

    <div class="auth-overlay" aria-hidden="true"></div>
    <section class="auth-panel" id="auth-panel" aria-hidden="true" aria-labelledby="auth-title" role="dialog" aria-modal="true">
        <button class="auth-close" type="button" aria-label="Close access panel">X</button>
        <h2 id="auth-title">Accedi a Trivit</h2>
        <p class="auth-copy">Usa email e password per entrare o creare il tuo account.</p>
        <form class="auth-form" id="auth-login-form" data-auth-mode="login">
            <label class="auth-field" for="auth-email">
                <span>Email</span>
                <input id="auth-email" name="email" type="email" autocomplete="email" required>
            </label>
            <label class="auth-field" for="auth-password">
                <span>Password</span>
                <input id="auth-password" name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="auth-submit" type="submit">LOG IN</button>
            <p class="auth-feedback" role="status" aria-live="polite"></p>
            <div class="auth-mode-switch">
                <span class="auth-mode-label">Non hai un account?</span>
                <button class="auth-mode-toggle" type="button">Registrati</button>
            </div>
        </form>
    </section>

    <main class="page-main">
        <section class="page-placeholder" aria-labelledby="page-title">
            <p class="page-kicker">Placeholder</p>
            <h1 id="page-title">Home</h1>
            <p class="page-path">/</p>
        </section>
    </main>

    <footer>
        <nav class="footer-tabs" aria-label="Footer navigation">
            <ul>
                <li><a href="help/">HELP</a></li>
                <li><a href="faq/">FAQ</a></li>
                <li><a href="about/">ABOUT US</a></li>
            </ul>
        </nav>
    </footer>

    <script src="script.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
